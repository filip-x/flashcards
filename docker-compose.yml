services:
  backend:
    build: .
    container_name: flashcards_backend
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./flashcards.db
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-8b-instant}
      - GROQ_BASE_URL=${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
    volumes:
      - ./flashcards.db:/app/flashcards.db
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: flashcards_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend


